services:
  # ===========================================
  # PostGIS Database Stack
  # ===========================================
  geoportal_db:
    image: postgis/postgis
    container_name: geoportal_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME}
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
    ports:
      - 8871:5432
    networks:
      - geoportal_network
    volumes:
      - geoportal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: geoportal_pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      geoportal_db:
        condition: service_healthy
    ports:
      - ${PGADMIN_PORT}:80
    networks:
      - geoportal_network

  adminer:
    image: adminer
    container_name: geoportal_adminer
    restart: always
    depends_on:
      geoportal_db:
        condition: service_healthy
    ports:
      - ${ADMINER_PORT}:8080
    networks:
      - geoportal_network

  # ===========================================
  # Geoserver Stack
  # ===========================================
  geoserver_db:
    image: kartoza/postgis:${POSTGIS_VERSION_TAG}
    container_name: geoportal-geoserver-db
    volumes:
      - geoserver_db_data:/var/lib/postgresql/data
    ports:
      - ${GEOSERVER_POSTGRES_PORT}:5432
    environment:
      - POSTGRES_DB=${GEOSERVER_POSTGRES_DB}
      - POSTGRES_USER=${GEOSERVER_POSTGRES_USER}
      - POSTGRES_PASS=${GEOSERVER_POSTGRES_PASS}
      - ALLOW_IP_RANGE=${ALLOW_IP_RANGE}
      - FORCE_SSL=TRUE
    restart: on-failure
    networks:
      - geoportal_network
    healthcheck:
      test: "PGPASSWORD=${GEOSERVER_POSTGRES_PASS} pg_isready -h 127.0.0.1 -U ${GEOSERVER_POSTGRES_USER} -d ${GEOSERVER_POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5

  geoserver:
    image: kartoza/geoserver:${GS_VERSION}
    container_name: geoportal-geoserver
    volumes:
      - geoserver_data:/opt/geoserver
    environment:
      - GEOSERVER_DATA_DIR=${GEOSERVER_DATA_DIR}
      - GEOWEBCACHE_CACHE_DIR=${GEOWEBCACHE_CACHE_DIR}
      - GEOSERVER_ADMIN_PASSWORD=${GEOSERVER_ADMIN_PASSWORD}
      - GEOSERVER_ADMIN_USER=${GEOSERVER_ADMIN_USER}
      - INITIAL_MEMORY=${INITIAL_MEMORY}
      - MAXIMUM_MEMORY=${MAXIMUM_MEMORY}
      - SAMPLE_DATA=true
    restart: on-failure
    depends_on:
      geoserver_db:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent --write-out 'HTTP CODE : %{http_code}\\n' --output /dev/null -u ${GEOSERVER_ADMIN_USER}:'${GEOSERVER_ADMIN_PASSWORD}' http://localhost:8080/geoserver/rest/about/version.xml"
      interval: 1m30s
      timeout: 10s
      retries: 3
    ports:
      - ${GEOSERVER_HOST_PORT}:8080
    networks:
      - geoportal_network

  # ===========================================
  # Geoportal Web Application
  # ===========================================
  web:
    build:
      context: ./geoportal_app
      dockerfile: Dockerfile
    container_name: geoportal_app
    env_file:
      - .env
    ports:
      - "${WEB_HOST_PORT}:${WEB_CONTAINER_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure
    depends_on:
      geoportal_db:
        condition: service_healthy
      geoserver:
        condition: service_healthy
    networks:
      - geoportal_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_CONTAINER_PORT}/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

# ===========================================
# Networks
# ===========================================
networks:
  geoportal_network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  geoportal_db_data:
  geoserver_db_data:
  geoserver_data:
