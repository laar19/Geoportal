<body>

    <div id="alert-container">
        {% with messages = get_flashed_messages(with_categories=true) %} {% if messages %}
        {% for category, message in messages %} <div class="alert alert-{{ category }} alert-dismissible fade show"
            role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <script>
            setTimeout(function () {
                const alertElements = document.querySelectorAll('.alert'); // Select all alerts
                alertElements.forEach(alertElement => {
                    new bootstrap.Alert(alertElement).close();
                });
            }, 3000);
        </script>
        {% endfor %}
        {% endif %}
        {% endwith %}
    </div>

    {% include 'sidebar.html' %}

    <div id="map" class="sidebar-map"></div>

    <!-- Inject Leaflet config from backend -->
    <script>
        window.LEAFLET_TILE_URL = {{ LEAFLET_TILE_URL | tojson }};
        window.LEAFLET_ATTRIBUTION = {{ LEAFLET_ATTRIBUTION | tojson }};
        window.LEAFLET_MIN_ZOOM = {{ LEAFLET_MIN_ZOOM | tojson }};
        // Health flags
        window.DB_OK = {{ DB_OK | tojson }};
        window.GEOSERVER_OK = {{ GEOSERVER_OK | tojson }};
        // Additional base layers
        window.LEAFLET_ESRI_URL = {{ LEAFLET_ESRI_URL | tojson }};
        window.LEAFLET_ESRI_ATTRIBUTION = {{ LEAFLET_ESRI_ATTRIBUTION | tojson }};
        window.LEAFLET_TERRAIN_URL = {{ LEAFLET_TERRAIN_URL | tojson }};
        window.LEAFLET_TERRAIN_ATTRIBUTION = {{ LEAFLET_TERRAIN_ATTRIBUTION | tojson }};
        window.LEAFLET_DARK_URL = {{ LEAFLET_DARK_URL | tojson }};
        window.LEAFLET_DARK_ATTRIBUTION = {{ LEAFLET_DARK_ATTRIBUTION | tojson }};
        window.LEAFLET_DARK_SUBDOMAINS = {{ LEAFLET_DARK_SUBDOMAINS | tojson }};
    </script>
    <div>
        <form id="search" method="GET" action="/search">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" id="satellite" name="satellite" value="">
            <input type="hidden" id="pan" name="pan" value="">
            <input type="hidden" id="mss" name="mss" value="">
            <input type="hidden" id="orbit" name="orbit" value="">
            <input type="hidden" id="scene" name="scene" value="">
            <input type="hidden" id="start_date" name="start_date" value="">
            <input type="hidden" id="end_date" name="end_date" value="">
            <input type="hidden" id="roll_angle" name="roll_angle" value="">
            <input type="hidden" id="cloud_percentage" name="cloud_percentage" value="">
            <input type="hidden" id="coordinates" name="coordinates" value="">
            <input type="hidden" id="zoom_level" name="zoom_level" value="">
            <input type="hidden" id="center" name="center" value="">
            <input type="hidden" id="search_status" name="search_status" value="False">
        </form>
    </div>

    <!-- BUSCADOR LEAFLET -->

    <!-- ACTIVAR INF AL BUSCAR -->
    <script src="{{ url_for('static', filename='js/search.js') }}"></script>

    <script>
        var geoserver_config = {{ geoserver_config| tojson }};
        var layers = {{ layers| tojson }};
        var error_ = {{ error_| tojson }};

        // Helper to toggle the GS indicator dot
        function setGsDot(ok) {
            try {
                var dot = document.getElementById('gs-dot');
                if (!dot) return;
                dot.classList.remove('ok', 'fail');
                dot.classList.add(ok ? 'ok' : 'fail');
            } catch (_) { }
        }

        // After initial render, ping backend health and decide what to do
        (function () {
            // If backend already told us it's down explicitly, skip ping
            if (typeof window.GEOSERVER_OK !== 'undefined' && window.GEOSERVER_OK === false) {
                setGsDot(false);
                if (typeof showNonBlockingAlert === 'function') {
                    showNonBlockingAlert('GeoServer is unavailable. Layers could not be loaded.', 'warning');
                }
                return;
            }
            // Otherwise, check health in the background
            try {
                fetch('{{ url_for("health_geoserver", _external=True) }}', { credentials: 'same-origin' })
                    .then(function (r) { return r.json(); })
                    .then(function (data) {
                        var ok = !!(data && data.ok);
                        if (ok) {
                            setGsDot(true);
                            try { show_raster_info(map, geoserver_config, layers, error_); } catch (e) { console.warn('show_raster_info failed:', e); }
                            return;
                        }

                        // Backend cannot reach GeoServer; try a browser-side fallback using public URL
                        try {
                            var PUB = {{ GEOSERVER_PUBLIC_URL| tojson
                        }};
                if (PUB && typeof PUB === 'string') {
                    var base = PUB.replace(/\/$/, '');
                    // Try both variants depending on whether PUB already contains /geoserver
                    var candidates = [
                        base + '/wms?service=WMS&request=GetCapabilities',
                        base + '/geoserver/wms?service=WMS&request=GetCapabilities'
                    ];
                    var tried = 0, success = false;
                    candidates.forEach(function (url) {
                        fetch(url, { mode: 'no-cors' })
                            .then(function () {
                                if (!success) {
                                    success = true;
                                    setGsDot(true);
                                    try { show_raster_info(map, geoserver_config, layers, error_); } catch (e) { console.warn('show_raster_info failed:', e); }
                                }
                            })
                            .catch(function () {
                                tried += 1;
                                if (tried >= candidates.length && !success) {
                                    setGsDot(false);
                                    if (typeof showNonBlockingAlert === 'function') {
                                        showNonBlockingAlert('GeoServer is unavailable from the server. If you can reach it in your browser, data requests may still fail until server connectivity is fixed.', 'warning');
                                    }
                                }
                            });
                    });
                    return;
                }
            } catch (_) { }

            // Final fallback: mark as down
            setGsDot(false);
            if (typeof showNonBlockingAlert === 'function') {
                showNonBlockingAlert('GeoServer is unavailable. Layers could not be loaded.', 'warning');
            }
        })
            .catch(function () {
                setGsDot(false);
            });
            } catch (e) {
            setGsDot(false);
        }
        }) ();
    </script>
