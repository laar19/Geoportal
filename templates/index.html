<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.4.3/css/ol.css" type="text/css">
    <script src="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@master/en/v6.4.3/build/ol.js"></script>

    <!-- local -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <title>Geo Abae</title>
</head>
<body>
    <div class="super">
         <div id="placeholder"></div>
        <div id="map" class="map"></div>
    </div>

    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
    <script src="{{ url_for('static', filename='js/functions.js') }}"></script>
    <script src="{{ url_for('static', filename='js/layer_styles.js') }}"></script>

    <script>
        var centros  = {{ data[0]|safe }};
        var estados  = {{ data[1]|safe }};
        var vialidad = {{ data[2]|safe }};
        var img      = {{ image|tojson }};
        var extent   = {{ extent }};
        console.log(extent);
        //extent = new ol.extent.applyTransform(extent, ol.proj.getTransform("EPSG:4326", "EPSG:3857"));
        //console.log(extent);
        
        display_layer(centros, map);
        display_layer(estados, map);
        display_layer(vialidad, map);

        var base64_image = new Image();
        base64_image.src = img["image"];

        // image div where the image will be displayed
        var imagePlaceholder = document.getElementById("placeholder");
        // display the image in div
        display_base64_image_div(imagePlaceholder, base64_image.src);

        display_base64_image(base64_image, extent, map);
    </script>
</body>
</html>
