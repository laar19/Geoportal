<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapas</title>
    
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- LIBRERIA DE BOTONES BOOTSTRAP -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- LIBERERIA DE BOTONES FONT-AWESOME -->
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.1.0/css/font-awesome.min.css" rel="stylesheet">

    <!-- Font Awesome JS -->
    <script defer src="https://use.fontawesome.com/releases/v5.0.13/js/solid.js" integrity="sha384-tzzSw1/Vo+0N5UhStP3bvwWPq+uvzCMfrN1fEFe+xBmv1C/AtVX5K0uZtmcHitFZ" crossorigin="anonymous"></script>
    <script defer src="https://use.fontawesome.com/releases/v5.0.13/js/fontawesome.js" integrity="sha384-6OIrr52G08NpOFSZdxxz1xdNSndlD4vdcf/q2myIUVO0VsqaGHJsB0RaBE01VTOY" crossorigin="anonymous"></script>

    <!-- LEAFLET -->
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
     
     <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

     <!-- AREA SELECTION PLUGIN -->
     <link rel="stylesheet" href="https://unpkg.com/@bopen/leaflet-area-selection@0.6.1/dist/index.css" />
     <script src="https://unpkg.com/@bopen/leaflet-area-selection@0.6.1/dist/index.umd.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/0.4.2/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/0.4.2/leaflet.draw.js"></script>
    
    <!-- BUSCADOR LEAFLET -->
    <!-- <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" /> -->

    <!-- CSS LOCAL -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <!-- SIDEBAR V2-MASTER LEFT-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/leaflet-sidebar-left.css') }}">
    <!-- SIDEBAR V2-MASTER RIGHT-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/leaflet-sidebar-right.css') }}">   
</head>
<body>
    <!-- SIDEBAR LEFT -->
    <div id="sidebar" class="sidebar collapsed">
        <!-- Nav tabs -->
        <div class="sidebar-tabs">
            <ul role="tablist">
                <li><a href="#satelite" role="tab"><i class="bi bi-question-circle"></i></a></li>
                <li><a href="#sensor" role="tab"><i class="bi bi-camera2"></i></a></li>
                <li><a href="#orbita" role="tab"><i class="bi bi-phone-vibrate"></i></a></li>
                <li><a href="#escena" role="tab"><i class="bi bi-question-circle"></i></a></li>
                <li><a href="#fecha" role="tab"><i class="bi bi-calendar"></i></a></li>
                <li><a href="#roll" role="tab"><i class="bi bi-question-circle"></i></a></li>
                <li><a href="#nubosidad" role="tab"><i class="bi bi-cloud-sun"></i></a></li>
            </ul>
        </div>

        <!-- Tab panes -->
        <div class="sidebar-content">
            <div class="sidebar-pane" id="satelite">
                <h1 class="sidebar-header">Satelite<span class="sidebar-close"><i class="fa fa-caret-left"></i></span></h1>
                <br>
                <select class="form-select form-select-sm" aria-label=".form-select-sm example">
                    <option value="VRSS-2">ALL</option>
                    <option value="VRSS-2">VRSS-1</option>
                    <option value="VRSS-2">VRSS-2</option>
                </select>
            </div>

            <div class="sidebar-pane" id="sensor">
                <h1 class="sidebar-header">Sensor<span class="sidebar-close"><i class="fa fa-caret-left"></i></span></h1>
                <br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
                    <label class="form-check-label" for="inlineCheckbox1">1</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
                    <label class="form-check-label" for="inlineCheckbox2">2</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="option3">
                    <label class="form-check-label" for="inlineCheckbox3">3</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="option4">
                    <label class="form-check-label" for="inlineCheckbox3">4</label>
                </div>
            </div>

            <div class="sidebar-pane" id="orbita">
                <h1 class="sidebar-header">Orbita<span class="sidebar-close"><i class="fa fa-caret-left"></i></span></h1>
                <br>
                <input class="form-control form-control-sm" type="text" placeholder="Ingrese Orbita">
            </div>

            <div class="sidebar-pane" id="escena">
                <h1 class="sidebar-header">Escena ID<span class="sidebar-close"><i class="fa fa-caret-left"></i></span></h1>
                <br>
                <input class="form-control form-control-sm" type="text" placeholder="Ingrese Scena ID">
            </div>

            <div class="sidebar-pane" id="fecha">
                <h1 class="sidebar-header">Rango de Fecha<span class="sidebar-close"><i class="fa fa-caret-left"></i></span></h1>
                <br>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Inicio</label>
                    <input type="date" class="form-control">
                    <br>
                    <label for="exampleInputEmail1" class="form-label">Fin</label>
                    <input type="date" class="form-control">
                </div>
            </div>

            <div class="sidebar-pane" id="roll">
                <h1 class="sidebar-header">Roll<span class="sidebar-close"><i class="fa fa-caret-left"></i></span></h1>
                <br>
                <label for="" class="form-label">Roll Max</label>
                <input type="range" class="form-range">
            </div>

            <div class="sidebar-pane" id="nubosidad">
                <h1 class="sidebar-header">% Nubosidad<span class="sidebar-close"><i class="fa fa-caret-left"></i></span></h1>
                <br>
                <input class="form-control form-control-sm" type="number" placeholder="0" max="30">
                <br><br>
                <button type="button" class="btn btn-primary">Enviar</button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR RIGHT -->
    <div id="sidebar1" class="sidebar1 collapsed">
        <!-- Nav tabs -->
        <div class="sidebar-tabs">
            <ul role="tablist">
                <li><a href="#informacion" role="tab"><i class="bi bi-info-circle"></i></a></li>
            </ul>
        </div>

        <!-- Tab panes -->
        <div class="sidebar-content">
            <div class="sidebar-pane" id="informacion">
                <h1 class="sidebar-header">
                    información
                    <span class="sidebar-close"><i class="fa fa-caret-left"></i></span>
                </h1>

    <div id="map" class="sidebar-map"></div>

    <div>
        <form id="search" method="POST" action="/search">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <input type="hidden" id="coordinates"   name="coordinates"   value="">
            <input type="hidden" id="zoom_level"    name="zoom_level"    value="">
            <input type="hidden" id="center"        name="center"        value="">
            <input type="hidden" id="search_status" name="search_status" value="False">
        </form>
    </div>

    <!-- jQuery CDN - Slim version (=without AJAX) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js" integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>

    <!-- Popper.JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js" integrity="sha384-cs/chFZiN24E4KMATLdqdvsezGxaGsi4hLGOzlXwp5UZB1LY//20VyM2taTB4QvJ" crossorigin="anonymous"></script>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <script> var map_config = {{ map_config|tojson }}; </script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>

    <!-- SIDEBAR V2-MASTER -->
    <script src="{{ url_for('static', filename='js/leaflet-sidebar.js') }}"></script>

    <script src="{{ url_for('static', filename='js/L.cascadeButtons.js') }}"></script>
    <script src="{{ url_for('static', filename='js/draw_control.js') }}"></script>
    
    <script src="{{ url_for('static', filename='js/functions.js') }}"></script>
    
    <script src="{{ url_for('static', filename='js/show_raster_info.js') }}"></script>    
    
    <!-- BUSCADOR LEAFLET -->
    <!-- script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script -->

    <script>
        var geoserver_info = {{ geoserver_info|tojson }};
        var layers         = {{ layers|tojson }};
        var error_         = {{ error_|tojson }};
        
        show_raster_info(map, geoserver_info, layers, error_);
    </script>
</body>
</html>
