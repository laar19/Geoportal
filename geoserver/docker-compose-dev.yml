volumes:
    geoserver-data:
    geo-db-data:

services:
    db:
        image         : kartoza/postgis:${POSTGIS_VERSION_TAG}
        container_name: geoportal_geoserver_db
        
        volumes:
            - geo-db-data:/var/lib/postgresql/data
        ports:
            - ${POSTGRES_PORT}:5432
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASS=${POSTGRES_PASS}
            - ALLOW_IP_RANGE=${ALLOW_IP_RANGE}
            - FORCE_SSL=TRUE
            
        restart: on-failure
        
        healthcheck:
            test: "PGPASSWORD=${POSTGRES_PASS} pg_isready -h 127.0.0.1 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"

    geoserver:
        image         : kartoza/geoserver:${GS_VERSION}
        container_name: geoportal_geoserver
        
        volumes:
            - geoserver-data:/opt/geoserver
        environment:
            - GEOSERVER_DATA_DIR=${GEOSERVER_DATA_DIR}
            - GEOWEBCACHE_CACHE_DIR=${GEOWEBCACHE_CACHE_DIR}
            - GEOSERVER_ADMIN_PASSWORD=${GEOSERVER_ADMIN_PASSWORD}
            - GEOSERVER_ADMIN_USER=${GEOSERVER_ADMIN_USER}
            - INITIAL_MEMORY=${INITIAL_MEMORY}
            - MAXIMUM_MEMORY=${MAXIMUM_MEMORY}
            - SAMPLE_DATA=true

        restart: on-failure
        
        depends_on:
            db:
                condition: service_healthy
                
        healthcheck:
            test: "curl --fail --silent --write-out 'HTTP CODE : %{http_code}\n' --output /dev/null -u ${GEOSERVER_ADMIN_USER}:'${GEOSERVER_ADMIN_PASSWORD}' http://localhost:8080/geoserver/rest/about/version.xml"
            interval: 1m30s
            timeout: 10s
            retries: 3
            
        ports:
            - ${GEOSERVER_PORT}:8080

    nginx:
        image         : nginx
        container_name: nginx_geoserver
        
        volumes:
            - ./sites-enabled:/etc/nginx/conf.d:ro
            
        logging:
            driver: json-file
            options:
                max-size: 200m
                max-file: '10'
                
        depends_on:
            - geoserver
            
        ports:
            #- ${HTTP_PORT}:80
            - ${HTTP_PORT}:${GEOSERVER_PORT}
